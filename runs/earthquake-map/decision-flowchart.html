  <text x="80" y="365" font-size="14" font-weight="bold" fill="#888">PHASE 1 — DISCOVERY</text>

  <text x="1200" y="410" text-anchor="middle" font-size="16" font-weight="bold">Discovery (initial)</text>
  <text x="1200" y="427" text-anchor="middle" font-size="11" fill="#3a6abf" font-style="italic">Ascertains the user's true intent beyond the written prompt — surfacing implicit assumptions and load-bearing decisions  ·  writes ledger-v1.json — 4 decisions</text>
  <text x="720" y="452" font-size="13" font-weight="bold" fill="#0a3a6a">D-DSC-1: Restatement.</text>
  <text x="720" y="470" font-size="12">Reframed prompt as "self-contained tool that displays earthquake events as markers on a geographic map" (vs report/dataset/pipeline).</text>
  <text x="720" y="495" font-size="13" font-weight="bold" fill="#0a3a6a">D-DSC-2: Twelve assumptions (A1–A12).</text>
  <text x="720" y="513" font-size="12">A1 visualization · A2 map-as-primary · A3 magnitude-encoded · A4 single-user/no-auth · A5 no-persistence · A6 public feed</text>
  <text x="720" y="528" font-size="12">A7 global · A8 recent-window · A9 pan/zoom/popup · A10 desktop-first · A11 local/standalone · A12 general-user audience</text>
  <text x="720" y="552" font-size="13" font-weight="bold" fill="#0a3a6a">D-DSC-3: Surfaced 3 inflection points.</text>
  <text x="720" y="570" font-size="12">IP1 live-vs-static (default static) · IP2 fixed-vs-adjustable window (default fixed) · IP3 filters-vs-none (default none).</text>

  <text x="1100" y="690" text-anchor="middle" font-size="16" font-weight="bold">Technical Discovery (initial mode)</text>
  <text x="1100" y="707" text-anchor="middle" font-size="11" fill="#3a6abf" font-style="italic">Translates Discovery's goal into a technical action plan  ·  writes sections-v1.json + 4 contracts — 10 decisions</text>

  <text x="520" y="735" font-size="13" font-weight="bold" fill="#0a3a6a">D-TD-1: Prompt-verb selection.</text>
  <text x="520" y="753" font-size="12">Among {build, visualize, map}, chose `visualize` as load-bearing. "build" rejected as meta; "map" rejected as medium. PNV authored.</text>

  <text x="520" y="778" font-size="13" font-weight="bold" fill="#0a3a6a">D-TD-2/3/4: Ratified Discovery's IP1/IP2/IP3 via quick reasoning.</text>
  <text x="520" y="796" font-size="12">All 4 conditions held (canonical, similar complexity, no new deps, reversible) for static-snapshot, fixed past-24h window, no filters.</text>

  <text x="520" y="821" font-size="13" font-weight="bold" fill="#0a3a6a">D-TD-5: Introduced + resolved TD-IP1: Map library = Leaflet (vendored).</text>
  <text x="520" y="839" font-size="12">Discovery had not picked. Chose Leaflet over MapLibre/Mapbox: canonical lightweight, no API token (would break A11), ~140KB vendors trivially.</text>

  <text x="520" y="864" font-size="13" font-weight="bold" fill="#0a3a6a">D-TD-6: Introduced + resolved TD-IP2: Data source = USGS past-day GeoJSON.</text>
  <text x="520" y="882" font-size="12">A6 said "public feed" without naming. Picked USGS: no API key, public domain, GeoJSON FeatureCollection, canonical worldwide.</text>

  <text x="520" y="907" font-size="13" font-weight="bold" fill="#0a3a6a">D-TD-7: Introduced + resolved TD-IP3: Encoding = size + color.</text>
  <text x="520" y="925" font-size="12">A3 said magnitude must be encoded but not how. Chose dual encoding (radius monotonic, fill stepping ≥3 buckets) for legibility.</text>

  <text x="520" y="950" font-size="13" font-weight="bold" fill="#0a3a6a">D-TD-8: Section breakdown (4 sections + edges).</text>
  <text x="520" y="968" font-size="12">S1 Data Fetcher · S2 Map Renderer · S3 Page Shell + Legend + Error State · S4 Edge-Case Testing. Dependencies: S1→S2; S1+S2→S3; all→Integrator; Integrator→S4.</text>

  <text x="520" y="993" font-size="13" font-weight="bold" fill="#0a3a6a">D-TD-9: Production-fidelity caveat acknowledged.</text>
  <text x="520" y="1011" font-size="12">Recorded that S1 requires live network at page load — explicitly accepted vs worked-around (per v1.6 design-time fidelity heuristic).</text>

  <text x="520" y="1034" font-size="13" font-weight="bold" fill="#c43c3c">D-TD-10: Coverage assertions — gap that triggers esc-001 later.</text>
  <text x="520" y="1052" font-size="12" fill="#c43c3c">Wrote 49 assertions covering Discovery's prose. Did NOT cover sections[].charter, per-section out_of_scope[], or contract interface/notes.</text>

  <text x="1100" y="1170" text-anchor="middle" font-size="11" fill="#3a6abf" font-style="italic">Sequences and dispatches the build work; tracks section deps  ·  writes dag.json, dispatch-log — 6 decisions; collapses Overseer×4 + Builder×~5 + Historian</text>

  <text x="520" y="1195" font-size="13" font-weight="bold" fill="#5a1a1a">D-CRD-1: Dispatch mode = inline.</text>
  <text x="520" y="1213" font-size="12">Set dispatch_mode: inline (single agent role-cycling) for this 4-section build, per ≤8 threshold.</text>

  <text x="520" y="1238" font-size="13" font-weight="bold" fill="#5a1a1a">D-CRD-2: DAG construction (5 nodes, 3 waves).</text>
  <text x="520" y="1256" font-size="12">Wave 1 = {S1, S2, S3} parallel against contracts. Wave 2 = Integrator pseudo-node. Wave 3 = S4 (depends_on integrator).</text>

  <text x="520" y="1281" font-size="13" font-weight="bold" fill="#5a1a1a">D-CRD-3: Wave-1 dispatch decisions.</text>
  <text x="520" y="1299" font-size="12">S1 → 1 builder. S2 → split into builder-2a (map.js) + builder-2-vendor (Leaflet asset bundle). S3 → 1 builder. Each verified inline before next.</text>

  <text x="520" y="1324" font-size="13" font-weight="bold" fill="#5a1a1a">D-CRD-4 / D-CRD-5: Logged inline-deviations dev-001 and dev-002.</text>
  <text x="520" y="1342" font-size="12">dev-001: Integrator wrote to output/integration/ vs contract's nominal final/. dev-002: flat layout vs js/+css/ subdirs. Both no-impact.</text>

  <text x="520" y="1357" font-size="12" font-weight="bold" fill="#5a1a1a">D-CRD-6:</text>
  <text x="585" y="1357" font-size="12">After S4 verified, wrote build-complete.json and signaled handoff to Orchestrator.</text>

<script>
(function(){
  const VBOX = { x: 0, y: 0, w: 2400, h: 4400 };
  let view = { ...VBOX };
  const stage = document.getElementById('stage');
  const svg = stage.querySelector('svg');
  const zoomInfo = document.getElementById('zoominfo');

  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
  apply();

  stage.addEventListener('wheel', function(e) {
    e.preventDefault();
    const rect = stage.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const sx = view.x + (mx / rect.width) * view.w;
    const sy = view.y + (my / rect.height) * view.h;
    const factor = e.deltaY > 0 ? 1.15 : 1 / 1.15;
    view.w *= factor;
    view.h *= factor;
    const minW = VBOX.w / 12, maxW = VBOX.w * 4;
    if (view.w < minW) { const f = minW / view.w; view.w *= f; view.h *= f; }
    if (view.w > maxW) { const f = maxW / view.w; view.w *= f; view.h *= f; }
    view.x = sx - (mx / rect.width) * view.w;
    view.y = sy - (my / rect.height) * view.h;
    apply();
  }, { passive: false });

  let panning = false;
  let last = { x: 0, y: 0 };
  stage.addEventListener('mousedown', function(e) {
    if (e.button === 1 || e.button === 0) {
      e.preventDefault();
      panning = true;
      last = { x: e.clientX, y: e.clientY };
      stage.classList.add('panning');
    }
  });
  window.addEventListener('mousemove', function(e) {
    if (!panning) return;
    const rect = stage.getBoundingClientRect();
    const dx = (e.clientX - last.x) * (view.w / rect.width);
    const dy = (e.clientY - last.y) * (view.h / rect.height);
    view.x -= dx;
    view.y -= dy;
    last = { x: e.clientX, y: e.clientY };
    apply();
  });
  window.addEventListener('mouseup', function() {
    if (panning) { panning = false; stage.classList.remove('panning'); }
  });
  stage.addEventListener('auxclick', function(e) { if (e.button === 1) e.preventDefault(); });

  function apply() {
    svg.setAttribute('viewBox', view.x + ' ' + view.y + ' ' + view.w + ' ' + view.h);
    zoomInfo.textContent = (VBOX.w / view.w * 100).toFixed(0) + '%';
  }

  document.getElementById('reset').addEventListener('click', function() { view = { ...VBOX }; apply(); });
  document.getElementById('zoomin').addEventListener('click', function() { view.w /= 1.3; view.h /= 1.3; apply(); });
  document.getElementById('zoomout').addEventListener('click', function() { view.w *= 1.3; view.h *= 1.3; apply(); });
})();
</script>
