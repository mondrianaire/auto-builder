# ============================================================================
# completion-triggered-fork.yml
#
# (NOTE: filename retained for git-history continuity. The workflow is now
# "Promotion-Triggered Fork" — it fires on a separate user-initiated
# promotion intent file, NOT on ratification. See build-lifecycle.md.)
#
# Fires the Fork ceremony from architecture/build-lifecycle.md when the user
# explicitly elects to promote a previously-ratified build by writing
# runs/{slug}/promoted.json (via promote-build.bat or equivalent).
#
# Ratification (completion-ratified.json) and promotion (promoted.json) are
# now distinct events. Ratification is universal — every successful build
# gets it. Promotion is opt-in and can be initiated at any time after
# ratification + wrap-up. This workflow fires on promotion only.
#
# Sequence:
#   1. Detect newly-added promoted.json files in the push
#   2. For each: verify the corresponding runs/{slug}/completion-ratified.json
#      exists (refuse to promote unratified builds) AND that CV verdict was
#      pass | pass_with_concerns
#   3. Use git filter-repo to extract just runs/{slug}/output/final/ history
#   4. Create mondrianaire/{slug}-AB if it doesn't exist (using FORK_PAT)
#   5. Generate README.md at the new repo root (build provenance + link to corpus)
#   6. Push filtered history + tags to the new repo
#   7. Write curation overlay update with promoted_to + promoted_at
#   8. Commit the curation update; aggregator-on-push.yml re-fires and dashboard
#      flips to "Promoted ★" badge
#
# REQUIRES SECRET: FORK_PAT
#   A fine-grained personal access token with:
#     - "Repository access" -> "Only select repositories" OR "All repositories"
#       (under owner: mondrianaire)
#     - "Administration: Read and write" (to create new repos)
#     - "Contents: Read and write" (to push to new repos)
#     - "Pages: Read and write" (to auto-enable Pages on web_app forks)
#   Stored in: Repo Settings -> Secrets and variables -> Actions -> FORK_PAT
#   NOTE: missing Pages scope is non-fatal — the fork still completes; only
#   the auto-Pages-enable step warns and continues.
#
# Author: Maintenance, per github-actions-automation-proposal.md §2 +
#         build-lifecycle.md (ratify/promote split).
# Commit signature: [bot:fork] per the [bot:{workflow}] namespace.
# ============================================================================

name: Promotion-Triggered Fork

on:
  push:
    branches: [main]
    paths:
      - 'runs/*/promoted.json'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Build slug to fork manually (skips diff detection; verifies the slug has a promoted.json AND completion-ratified.json on main)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  # Don't run multiple fork ceremonies simultaneously — git filter-repo + the
  # GitHub API repo creation should be serial to avoid weird states.
  group: fork-ceremony
  cancel-in-progress: false

jobs:
  fork:
    # Loop-safety: skip our own auto-commits and Codex's aggregator output.
    if: ${{ !startsWith(github.event.head_commit.message, '[bot:') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Identify newly-added completion-ratified.json files
        id: find_new
        run: |
          NEW_SLUGS=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger: use the supplied slug directly. Verify both
            # completion-ratified.json AND promoted.json exist (promotion
            # requires the build was already ratified).
            MANUAL_SLUG="${{ inputs.slug }}"
            if [ -z "$MANUAL_SLUG" ]; then
              echo "::error::Manual trigger requires a slug input."
              exit 1
            fi
            if [ ! -f "runs/$MANUAL_SLUG/completion-ratified.json" ]; then
              echo "::error::Cannot promote '$MANUAL_SLUG' — runs/$MANUAL_SLUG/completion-ratified.json missing on main. Build must be ratified first."
              exit 1
            fi
            if [ ! -f "runs/$MANUAL_SLUG/wrap-up-complete.json" ]; then
              echo "::error::Cannot promote '$MANUAL_SLUG' — runs/$MANUAL_SLUG/wrap-up-complete.json missing on main. The wrap-up routine must complete first (run wrap-up-build.bat $MANUAL_SLUG, then deploy-session.bat)."
              exit 1
            fi
            if [ ! -f "runs/$MANUAL_SLUG/promoted.json" ]; then
              echo "::error::Cannot promote '$MANUAL_SLUG' — runs/$MANUAL_SLUG/promoted.json missing on main. Run promote-build.bat to record promotion intent first."
              exit 1
            fi
            NEW_SLUGS="$MANUAL_SLUG"
            echo "Manual trigger: processing $MANUAL_SLUG"
          else
            # Push trigger: diff the push range, not just HEAD~1..HEAD.
            # github.event.before is the commit SHA before the push started,
            # so it correctly captures multi-commit pushes.
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BEFORE="HEAD~1"
            fi
            echo "Diff range: $BEFORE..HEAD"

            while IFS= read -r f; do
              [ -z "$f" ] && continue
              SLUG=$(echo "$f" | sed 's|runs/\([^/]*\)/promoted\.json|\1|')
              if [ -n "$SLUG" ] && [ -d "runs/$SLUG" ]; then
                # Defense in depth: refuse to promote unratified builds even
                # if a stray promoted.json appears
                if [ ! -f "runs/$SLUG/completion-ratified.json" ]; then
                  echo "::warning::Skipping $SLUG — promoted.json appeared without completion-ratified.json (unratified build). Ratify first via ratify-build.bat."
                  continue
                fi
                # Defense in depth: refuse to promote builds whose wrap-up
                # routine hasn't completed (PROJECT-OVERVIEW.md + sentinel).
                # promote-build.bat already enforces this, but workflow #2
                # re-checks in case promoted.json was hand-written.
                if [ ! -f "runs/$SLUG/wrap-up-complete.json" ]; then
                  echo "::warning::Skipping $SLUG — promoted.json present but wrap-up-complete.json missing. Run wrap-up-build.bat $SLUG (+ deploy-session.bat) before promotion."
                  continue
                fi
                NEW_SLUGS="$NEW_SLUGS $SLUG"
              fi
            done < <(git diff --name-only --diff-filter=A "$BEFORE" HEAD -- 'runs/*/promoted.json' 2>/dev/null || true)
          fi

          NEW_SLUGS_TRIM=$(echo "$NEW_SLUGS" | xargs)
          echo "Found new ratifications: '$NEW_SLUGS_TRIM'"
          echo "slugs=$NEW_SLUGS_TRIM" >> "$GITHUB_OUTPUT"

      - name: Setup Python (for git-filter-repo)
        if: steps.find_new.outputs.slugs != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install git-filter-repo
        if: steps.find_new.outputs.slugs != ''
        run: pip install git-filter-repo

      - name: Setup Node (for JSON parse + curation write)
        if: steps.find_new.outputs.slugs != ''
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Process each new ratification
        if: steps.find_new.outputs.slugs != ''
        env:
          FORK_PAT: ${{ secrets.FORK_PAT }}
          GH_OWNER: mondrianaire
        run: |
          set -e

          if [ -z "$FORK_PAT" ]; then
            echo "::error::FORK_PAT secret is not set. Cannot create or push to standalone repos. See workflow file header for setup instructions."
            exit 1
          fi

          for SLUG in ${{ steps.find_new.outputs.slugs }}; do
            echo ""
            echo "============================================================"
            echo "=== Processing fork ceremony for $SLUG ==="
            echo "============================================================"

            # ----- (1) Verify verdict is acceptable -----
            REPORT="runs/$SLUG/output/verification/report.json"
            if [ ! -f "$REPORT" ]; then
              echo "::error::$REPORT missing for $SLUG; cannot verify verdict. Skipping."
              continue
            fi

            VERDICT=$(node -e "try{const r=JSON.parse(require('fs').readFileSync('$REPORT','utf8'));process.stdout.write(r.verdict||'missing')}catch(e){process.stdout.write('parse_error')}")
            case "$VERDICT" in
              pass|pass_with_concerns)
                echo "Verdict OK: $VERDICT"
                ;;
              fail)
                echo "::error::Verdict for $SLUG is 'fail'; ratification should not have been allowed. Skipping fork."
                continue
                ;;
              missing|parse_error|*)
                echo "::error::Verdict for $SLUG is unexpected: $VERDICT. Skipping fork."
                continue
                ;;
            esac

            NEW_REPO="${SLUG}-AB"
            FULL_REPO="${GH_OWNER}/${NEW_REPO}"

            # ----- (2) Create target repo if it doesn't exist -----
            HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $FORK_PAT" \
              "https://api.github.com/repos/$FULL_REPO" || echo "404")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Target repo $FULL_REPO already exists; will push to existing."
            else
              echo "Creating $FULL_REPO via GitHub API..."
              CREATE_RESPONSE=$(curl -s -X POST \
                -H "Authorization: token $FORK_PAT" \
                -H "Accept: application/vnd.github+json" \
                -d "{\"name\":\"$NEW_REPO\",\"private\":false,\"description\":\"Forked from AutoBuilder run $SLUG (mondrianaire/auto-builder). Standalone repo for post-completion product life per architecture/build-lifecycle.md.\",\"auto_init\":false}" \
                "https://api.github.com/user/repos")

              CREATED_NAME=$(echo "$CREATE_RESPONSE" | node -e "let s='';process.stdin.on('data',c=>s+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(s).full_name||'')}catch(e){}})")

              if [ "$CREATED_NAME" != "$FULL_REPO" ]; then
                echo "::error::Failed to create $FULL_REPO. API response: $CREATE_RESPONSE"
                continue
              fi
              echo "Created $FULL_REPO."
            fi

            # ----- (3) Pre-extract README context from the corpus before filtering -----
            # Filter-repo strips everything outside output/final/, so we read the
            # corpus data (prompt, run-report, ratification meta, index.json
            # summary) BEFORE the filter and template a README from it.
            PROMPT_TEXT=$(cat "runs/$SLUG/prompt.txt" 2>/dev/null || echo "(prompt.txt missing from corpus)")
            RATIFIED_BY=$(node -e "try{const r=JSON.parse(require('fs').readFileSync('runs/$SLUG/completion-ratified.json','utf8'));process.stdout.write(r.ratified_by||'unknown')}catch(e){process.stdout.write('unknown')}")
            RATIFIED_AT=$(node -e "try{const r=JSON.parse(require('fs').readFileSync('runs/$SLUG/completion-ratified.json','utf8'));process.stdout.write(r.ratified_at||'unknown')}catch(e){process.stdout.write('unknown')}")
            TELOS=$(node -e "try{const idx=JSON.parse(require('fs').readFileSync('codex/data/index.json','utf8'));const r=(idx.runs||[]).find(x=>x.slug==='$SLUG');process.stdout.write(r&&r.telos?r.telos:'(telos not surfaced in corpus index)')}catch(e){process.stdout.write('(telos lookup failed)')}")
            ARCH_VERSION=$(node -e "try{const idx=JSON.parse(require('fs').readFileSync('codex/data/index.json','utf8'));const r=(idx.runs||[]).find(x=>x.slug==='$SLUG');process.stdout.write(r&&r.architecture_version?r.architecture_version:'unknown')}catch(e){process.stdout.write('unknown')}")
            WALL_MIN=$(node -e "try{const idx=JSON.parse(require('fs').readFileSync('codex/data/index.json','utf8'));const r=(idx.runs||[]).find(x=>x.slug==='$SLUG');process.stdout.write(r&&r.counts&&r.counts.wall_clock_minutes?String(r.counts.wall_clock_minutes):'unknown')}catch(e){process.stdout.write('unknown')}")
            FDO=$(node -e "try{const idx=JSON.parse(require('fs').readFileSync('codex/data/index.json','utf8'));const r=(idx.runs||[]).find(x=>x.slug==='$SLUG');process.stdout.write(r&&r.first_delivery_outcome?r.first_delivery_outcome:'unknown')}catch(e){process.stdout.write('unknown')}")
            DELIVERABLE_KIND=$(node -e "try{const idx=JSON.parse(require('fs').readFileSync('codex/data/index.json','utf8'));const r=(idx.runs||[]).find(x=>x.slug==='$SLUG');process.stdout.write(r&&r.deliverable_kind?r.deliverable_kind:'unknown')}catch(e){process.stdout.write('unknown')}")
            LIVE_URL=$(node -e "try{const idx=JSON.parse(require('fs').readFileSync('codex/data/index.json','utf8'));const r=(idx.runs||[]).find(x=>x.slug==='$SLUG');process.stdout.write(r&&r.live_url?r.live_url:'')}catch(e){process.stdout.write('')}")

            # Read templates from architecture/ (Maintenance canon).
            # Substituted into the new repo at fork time.
            README_TEMPLATE_PATH="$GITHUB_WORKSPACE/architecture/promoted-repo-readme-template.md"
            CLAUDE_TEMPLATE_PATH="$GITHUB_WORKSPACE/architecture/claude-code-handoff-template.md"

            # ----- (4) Filter-repo in a temp clone, narrowed to output/final/ -----
            TMPDIR=$(mktemp -d)
            EXTRACT_DIR="$TMPDIR/extracted"
            git clone --no-local "$GITHUB_WORKSPACE" "$EXTRACT_DIR"
            (
              cd "$EXTRACT_DIR"
              # Narrowed filter: only the production deliverable (output/final/),
              # NOT the full build substrate. Per build-lifecycle.md § Fork Ceremony.
              # The corpus metadata (audit/, decisions/, history/, state/, etc.)
              # stays in the AutoBuilder repo and does not belong in the
              # standalone product repo.
              git filter-repo --path "runs/$SLUG/output/final/" --path-rename "runs/$SLUG/output/final/:" --force

              # Write the AutoBuilder-generated README at the new repo root.
              # Template lives at architecture/promoted-repo-readme-template.md.
              # Same node-substitution pattern as the CLAUDE.md generation below.
              if [ -f "$README_TEMPLATE_PATH" ]; then
                node -e "
                  const fs = require('fs');
                  const tpl = fs.readFileSync(process.argv[1], 'utf8');
                  const out = tpl
                    .replace(/\\{slug\\}/g, process.argv[2])
                    .replace(/\\{telos\\}/g, process.argv[3])
                    .replace(/\\{promoted_at\\}/g, process.argv[4])
                    .replace(/\\{prompt\\}/g, process.argv[5])
                    .replace(/\\{verdict\\}/g, process.argv[6])
                    .replace(/\\{fdo\\}/g, process.argv[7])
                    .replace(/\\{ratified_at\\}/g, process.argv[8])
                    .replace(/\\{ratified_by\\}/g, process.argv[9])
                    .replace(/\\{architecture_version\\}/g, process.argv[10])
                    .replace(/\\{wall_min\\}/g, process.argv[11]);
                  fs.writeFileSync('README.md', out);
                " "$README_TEMPLATE_PATH" "$SLUG" "$TELOS" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$PROMPT_TEXT" "$VERDICT" "$FDO" "$RATIFIED_AT" "$RATIFIED_BY" "$ARCH_VERSION" "$WALL_MIN"
              else
                echo "::error::architecture/promoted-repo-readme-template.md not found at $README_TEMPLATE_PATH — cannot generate README."
                exit 1
              fi

              git add README.md
              git -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
                  -c user.name="github-actions[bot]" \
                  commit -m "[bot:fork] AutoBuilder-generated README for $SLUG" \
                         -m "Auto-generated by completion-triggered-fork.yml at fork time. Pulls from runs/$SLUG/prompt.txt, completion-ratified.json, and codex/data/index.json. See architecture/build-lifecycle.md for the full Fork Ceremony spec."

              # Seed .claude/CLAUDE.md so a fresh Claude Code session opened
              # against this fork lands with full context. Per
              # claude-code-handoff-tier1-proposal: read the canonical template
              # from architecture/, substitute build-specific fields, write to
              # .claude/CLAUDE.md inside the new repo's tree.
              if [ -f "$CLAUDE_TEMPLATE_PATH" ]; then
                mkdir -p .claude
                node -e "
                  const fs = require('fs');
                  const tpl = fs.readFileSync(process.argv[1], 'utf8');
                  const liveUrl = process.argv[7] || '(none — this build is not a deployed web app)';
                  const out = tpl
                    .replace(/\\{slug\\}/g, process.argv[2])
                    .replace(/\\{prompt\\}/g, process.argv[3])
                    .replace(/\\{promoted_at\\}/g, process.argv[4])
                    .replace(/\\{deliverable_kind\\}/g, process.argv[5])
                    .replace(/\\{verdict\\}/g, process.argv[6])
                    .replace(/\\{live_url_if_present\\}/g, liveUrl)
                    .replace(/\\{ratified_at\\}/g, process.argv[8])
                    .replace(/\\{ratified_by\\}/g, process.argv[9])
                    .replace(/\\{architecture_version\\}/g, process.argv[10]);
                  fs.writeFileSync('.claude/CLAUDE.md', out);
                " "$CLAUDE_TEMPLATE_PATH" "$SLUG" "$PROMPT_TEXT" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$DELIVERABLE_KIND" "$VERDICT" "$LIVE_URL" "$RATIFIED_AT" "$RATIFIED_BY" "$ARCH_VERSION"
                git add .claude/CLAUDE.md
                git -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
                    -c user.name="github-actions[bot]" \
                    commit -m "[bot:fork] seed .claude/CLAUDE.md for $SLUG product-life handoff" \
                           -m "Per claude-code-handoff-tier1-proposal: when a fresh Claude Code session is opened against this fork, this file provides orientation about what was built, the original prompt, where the corpus lives, and what's safe to edit."
              else
                echo "::warning::architecture/claude-code-handoff-template.md not found at \$CLAUDE_TEMPLATE_PATH — skipping .claude/CLAUDE.md seed for $SLUG"
              fi

              git remote remove origin 2>/dev/null || true
              git remote add origin "https://x-access-token:$FORK_PAT@github.com/$FULL_REPO.git"
              # Force-push: promotion is a re-derivation event. The AutoBuilder
              # corpus is canonical; the standalone fork is a derived artifact
              # of runs/$SLUG/output/final/. If the fork already exists with
              # divergent history (prior broken fork attempt, or re-promotion
              # after a curation overlay change), we overwrite it rather than
              # try to merge. Users doing post-promotion product-life work
              # should not re-trigger promotion on the same slug.
              echo "Force-pushing filtered output/final/ history to $FULL_REPO (re-derivation semantics — see workflow comment)."
              git push -u --force origin main
              git push --force origin --tags
            )
            rm -rf "$TMPDIR"

            echo "Pushed filtered output/final/ + README to https://github.com/$FULL_REPO"

            # ----- (5) Auto-enable GitHub Pages for web_app deliverables -----
            # For web_app builds, the deliverable IS a deployable static site
            # (index.html + assets at the repo root after filter-repo strip).
            # Enabling Pages with source=main, path=/ gives the user a
            # browser-openable URL the moment promotion finishes, with zero
            # additional clicks. Non-web deliverables (plugin, cli, library,
            # etc.) skip this step — there is nothing meaningful to serve.
            #
            # FORK_PAT must include "Pages: Read and write" scope. If missing,
            # the API call returns 403 and we log a warning + continue (the
            # fork itself is fine; the user can enable Pages manually).
            PAGES_LIVE_URL=""
            if [ "$DELIVERABLE_KIND" = "web_app" ]; then
              echo "web_app deliverable detected — attempting to enable Pages on $FULL_REPO"
              PAGES_HTTP=$(curl -s -o /tmp/pages_resp.json -w "%{http_code}" -X POST \
                -H "Authorization: token $FORK_PAT" \
                -H "Accept: application/vnd.github+json" \
                -d '{"source":{"branch":"main","path":"/"}}' \
                "https://api.github.com/repos/$FULL_REPO/pages" || echo "000")
              case "$PAGES_HTTP" in
                201|204)
                  PAGES_LIVE_URL="https://${GH_OWNER}.github.io/${NEW_REPO}/"
                  echo "Pages enabled: $PAGES_LIVE_URL (may take ~1 min for first deploy)"
                  ;;
                409)
                  # Already enabled (re-promotion case). Treat as success.
                  PAGES_LIVE_URL="https://${GH_OWNER}.github.io/${NEW_REPO}/"
                  echo "Pages already enabled on $FULL_REPO; treating as success: $PAGES_LIVE_URL"
                  ;;
                403)
                  echo "::warning::Pages enable returned 403 — FORK_PAT likely missing 'Pages: Read and write' scope. Fork is fine; user can enable Pages manually at https://github.com/$FULL_REPO/settings/pages"
                  cat /tmp/pages_resp.json || true
                  ;;
                *)
                  echo "::warning::Pages enable returned $PAGES_HTTP for $FULL_REPO. Fork is fine; user can enable Pages manually at https://github.com/$FULL_REPO/settings/pages"
                  cat /tmp/pages_resp.json || true
                  ;;
              esac
            else
              echo "Deliverable kind '$DELIVERABLE_KIND' is not web_app — skipping Pages enable."
            fi

            # ----- (6) Update curation overlay -----
            CURATION="codex/data/curation/$SLUG.json"
            mkdir -p "$(dirname "$CURATION")"
            node -e "
              const fs = require('fs');
              const path = '$CURATION';
              const data = fs.existsSync(path) ? JSON.parse(fs.readFileSync(path, 'utf8')) : { slug: '$SLUG' };
              data.promoted_to = 'https://github.com/$FULL_REPO';
              data.promoted_at = new Date().toISOString();
              const pagesUrl = process.argv[1] || '';
              if (pagesUrl) {
                data.live_url = pagesUrl;
                data.live_url_source = 'github-pages-auto-enabled-at-promotion';
              }
              fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
              console.log('Updated', path, pagesUrl ? '(with live_url='+pagesUrl+')' : '(no live_url)');
            " "$PAGES_LIVE_URL"
          done

      - name: Commit curation updates
        if: steps.find_new.outputs.slugs != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # IMPORTANT: stage first, then check staged diff. `git diff` alone
          # doesn't see untracked new files, which is exactly what curation
          # writes are (first time a build is promoted, its curation file
          # is brand new). The earlier `git diff --quiet codex/data/curation/`
          # check returned 0 even when a new file was written, causing the
          # commit step to silently skip.
          git add codex/data/curation/ || true
          if git diff --cached --quiet; then
            echo "No staged curation changes — either no slugs were processed or the curation write didn't happen."
          else
            echo "Staged curation changes:"
            git diff --cached --name-only
            git commit -m "[bot:fork] curation updates for promoted builds (${{ steps.find_new.outputs.slugs }})" \
                       -m "Auto-generated by .github/workflows/completion-triggered-fork.yml. Each affected codex/data/curation/{slug}.json now carries promoted_to + promoted_at fields. Aggregator-on-push.yml will re-fire on this commit and the dashboard will flip the affected builds' phase chips to 'Promoted *'."
            git push origin main
          fi
