# ============================================================================
# tag-driven-rederivation.yml
#
# Runs the Codex aggregator when delivery/* tags are pushed (creation or
# update). Lets readGitLog.mjs pick up new tag data and populate revisions[]
# without a manual aggregator re-run.
#
# Paired with aggregator-on-push.yml — they share workflow structure but fire
# on different triggers. If a commit-and-tag pair pushes together (common
# with commit-build.bat), aggregator-on-push handles the commit and this
# handles the tag; the second to run finds no changes and no-ops (idempotent).
#
# Author: Maintenance (per workflow-ownership decision).
# Commit signature: [bot:tag-rederive] per §Open question 2.
# ============================================================================

name: Tag-Driven Re-derivation

on:
  push:
    tags:
      - 'delivery/**'

permissions:
  contents: write

concurrency:
  group: tag-rederive-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rederive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main with full history
        uses: actions/checkout@v4
        with:
          # Checkout main branch (not the tag ref) so we commit aggregator
          # output back to the branch, not detached HEAD at the tag.
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify the triggering tag is reachable
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "Triggered by tag push: $TAG_NAME"
          git fetch origin --tags
          git tag -l "delivery/*"

      - name: Run aggregator
        run: node codex/scripts/aggregate.mjs

      - name: Check for changes under codex/data/
        id: check_changes
        run: |
          if git diff --quiet codex/data/; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "No aggregator output changes; tag push is idempotent."
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "Aggregator output changed; will commit."
            git diff --stat codex/data/
          fi

      - name: Commit and push regenerated codex/data/
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add codex/data/
          if [ -d codex/showcase ]; then
            git add codex/showcase/
          fi
          git commit -m "[bot:tag-rederive] refresh codex/data after tag push: ${TAG_NAME}" \
                     -m "Auto-generated by .github/workflows/tag-driven-rederivation.yml in response to ${TAG_NAME} push. Re-ran node codex/scripts/aggregate.mjs to let readGitLog.mjs pick up the new tag and update revisions[] data. Loop-safety: aggregator-on-push.yml skips [bot:*] commits, so this commit doesn't trigger a second aggregator run."
          git push origin main
