# ============================================================================
# aggregator-on-push.yml
#
# Runs the Codex aggregator (codex/scripts/aggregate.mjs) on every push to
# main and commits regenerated codex/data/* back if anything changed.
#
# Closes the "substrate-staleness gap" from github-actions-automation-proposal.md.
# Eliminates the need for humans to manually run build-codex.bat after every
# commit cycle. Once this is live, local aggregator runs become optional —
# the Action ensures the substrate is always fresh.
#
# Loop-safety: skips runs whose head commit message starts with "[bot:" —
# our own auto-commits won't trigger another aggregator run.
#
# Author: Maintenance (per workflow-ownership decision in
#         codex/docs/maintenance-initiated/github-actions-automation-proposal.md
#         §Open question 1).
# Commit signature: [bot:aggregator] per §Open question 2.
# ============================================================================

name: Aggregator on Push

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  # One in-flight aggregator run at a time per branch. Don't cancel mid-run
  # (the aggregator is fast and idempotent; queuing is safer than cancelling).
  group: aggregator-${{ github.ref }}
  cancel-in-progress: false

jobs:
  aggregate:
    # Skip our own auto-commits (loop-safety). Also skip any commit whose
    # message starts with [bot:*] from any other bot in the future.
    if: ${{ !startsWith(github.event.head_commit.message, '[bot:') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          # Full history needed by readGitLog.mjs to resolve delivery/* tags
          fetch-depth: 0
          # Use the default GITHUB_TOKEN; sufficient for same-repo writes.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Match local target (Node 22 confirmed on Jett's machine 2026-05-15)
          node-version: '22'

      - name: Run aggregator
        run: node codex/scripts/aggregate.mjs

      - name: Check for changes under codex/data/
        id: check_changes
        run: |
          if git diff --quiet codex/data/; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "No aggregator output changes; nothing to commit."
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "Aggregator output changed; will commit."
            git diff --stat codex/data/
          fi

      - name: Commit and push regenerated codex/data/
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add codex/data/
          # Also pick up showcase regeneration if present
          if [ -d codex/showcase ]; then
            git add codex/showcase/
          fi
          git commit -m "[bot:aggregator] refresh codex/data after ${{ github.sha }}" \
                     -m "Auto-generated by .github/workflows/aggregator-on-push.yml in response to ${{ github.sha }} on main. Re-ran node codex/scripts/aggregate.mjs and committed any resulting changes to codex/data/ and codex/showcase/. Loop-safety: this commit's [bot:aggregator] prefix prevents the workflow from re-triggering on its own push."
          git push origin main
